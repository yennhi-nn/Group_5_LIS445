<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title> Module 3</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 18px;
            background: #fafafa
        }

        .top {
            display: flex;
            gap: 12px;
            align-items: center
        }

        .card {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fff;
            margin-bottom: 12px
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 12px;
            font-size: 14px
        }

        th,
        td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: left
        }

        th {
            background: #f7f7f7
        }

        nav.tabs {
            margin-top: 12px
        }

        nav.tabs button {
            padding: 8px 12px;
            margin-right: 6px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer
        }

        nav.tabs button.active {
            background: #007bff;
            color: #fff;
            border-color: #007bff
        }

        pre {
            white-space: pre-wrap
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <h1>Góc Nhìn Toàn Cảnh - Module 3</h1>

    <div class="top">
        <div class="card" style="flex:1">
            <strong>Tổng quan</strong>
            <div style="margin-top:8px">Số bản ghi ghép: <span id="merged_count">Loading...</span></div>
            <div>Đơn hàng: <span id="orders_count">-</span> | Thanh toán: <span id="tx_count">-</span></div>
        </div>
        <div class="card" style="width:420px">
            <strong>Tìm kiếm & Xuất</strong>
            <div class="controls">
                <input id="search" placeholder="Tìm customer_id hoặc order_id" style="flex:1;padding:6px" />
                <button id="export-csv">Xuất CSV</button>
            </div>
        </div>
    </div>

    <nav class="tabs card">
        <button data-tab="overview" class="active">Tổng quan</button>
        <button data-tab="customers">Tóm tắt khách hàng</button>
        <button data-tab="orders">Đơn hàng</button>
        <button data-tab="transactions">Thanh toán</button>
        <button data-tab="merged">Đã ghép</button>
    </nav>

    <div id="content">
        <section id="overview" class="card">
            <canvas id="revenueChart" height="120"></canvas>
        </section>

        <section id="customers" class="card" style="display:none">
            <table id="summary-table">
                <thead>
                    <tr>
                        <th>Khách hàng</th>
                        <th>Số đơn</th>
                        <th>Tổng doanh thu</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="summary-pagination" class="controls"></div>
        </section>

        <section id="orders" class="card" style="display:none">
            <table id="orders-table">
                <thead>
                    <tr>
                        <th>order_id</th>
                        <th>customer_id</th>
                        <th>product_id</th>
                        <th>số lượng</th>
                        <th>tổng tiền</th>
                        <th>trạng thái</th>
                        <th>thời gian</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="orders-pagination" class="controls"></div>
        </section>

        <section id="transactions" class="card" style="display:none">
            <table id="tx-table">
                <thead>
                    <tr>
                        <th>order_id</th>
                        <th>customer_id(tx)</th>
                        <th>số tiền</th>
                        <th>trạng thái</th>
                        <th>thời gian</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="merged" class="card" style="display:none">
            <table id="merged-table">
                <thead>
                    <tr id="merged-headers"></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="ai" class="card" style="display:none">
            <pre id="ai-insight">Đang tải...</pre>
        </section>
    </div>

    <script>
        let rawData = null;
        const tabs = document.querySelectorAll('nav.tabs button');
        tabs.forEach(b => b.addEventListener('click', () => {
            tabs.forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('#content section').forEach(s => s.style.display = 'none');
            document.getElementById(b.dataset.tab).style.display = 'block';
        }));

        function numberFormat(n) { return Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }) }

        const state = { orders_page: 1, orders_per_page: 10, summary_page: 1, summary_per_page: 10 };

        function buildQs(opts = {}) {
            const q = new URLSearchParams();
            const s = Object.assign({}, state, opts);
            q.set('orders_page', s.orders_page);
            q.set('orders_per_page', s.orders_per_page);
            q.set('summary_page', s.summary_page);
            q.set('summary_per_page', s.summary_per_page);
            return q.toString();
        }

        async function loadReport(opts = {}) {
            try {
                Object.assign(state, opts);
                const qs = buildQs();
                const res = await fetch('/api/report?' + qs);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                rawData = data;

                document.getElementById('merged_count').textContent = data.merged_count ?? 0;
                document.getElementById('orders_count').textContent = (data.orders_meta && data.orders_meta.total) || (data.orders || []).length;
                document.getElementById('tx_count').textContent = (data.transactions || []).length;

                // Summary (paginated)
                const tbody = document.querySelector('#summary-table tbody'); tbody.innerHTML = '';
                (data.customer_summary || []).forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = `<td>${r.customer_id}</td><td>${r.total_orders}</td><td>${numberFormat(r.total_revenue)}</td>`; tbody.appendChild(tr); });
                renderPagination(data.customer_summary_meta, 'summary-pagination', (p) => loadReport({ summary_page: p }));

                // Orders (paginated)
                const otbody = document.querySelector('#orders-table tbody'); otbody.innerHTML = '';
                (data.orders || []).forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = `<td>${r.order_id}</td><td>${r.customer_id}</td><td>${r.product_id || ''}</td><td>${r.quantity || ''}</td><td>${r.total_price || ''}</td><td>${r.status || ''}</td><td>${r.created_at || ''}</td>`; otbody.appendChild(tr); });
                renderPagination(data.orders_meta, 'orders-pagination', (p) => loadReport({ orders_page: p }));

                // Transactions
                const ttbody = document.querySelector('#tx-table tbody'); ttbody.innerHTML = ''; (data.transactions || []).forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = `<td>${r.order_id}</td><td>${r.tx_customer_id || ''}</td><td>${r.amount || ''}</td><td>${r.tx_status || ''}</td><td>${r.tx_created_at || ''}</td>`; ttbody.appendChild(tr); });

                // Merged (full)
                const mtbody = document.querySelector('#merged-table tbody'); mtbody.innerHTML = ''; const headersRow = document.getElementById('merged-headers'); headersRow.innerHTML = ''; if ((data.merged || []).length > 0) { const cols = Object.keys(data.merged[0]); cols.forEach(c => headersRow.insertAdjacentHTML('beforeend', `<th>${c}</th>`)); data.merged.forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = cols.map(c => `<td>${r[c] ?? ''}</td>`).join(''); mtbody.appendChild(tr); }); }

                // AI
                document.getElementById('ai-insight').textContent = JSON.stringify(data.ai_insight || {}, null, 2);

                // Chart top 10 (from full summary if present)
                const top = (data.customer_summary || []).slice(0, 10);
                const labels = top.map(r => r.customer_id);
                const values = top.map(r => r.total_revenue);
                renderChart(labels, values);
            } catch (err) {
                alert('Lỗi tải báo cáo: ' + err.message);
            }
        }

        function renderPagination(meta, containerId, onPage) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            if (!meta || meta.total_pages <= 1) return;
            const prev = document.createElement('button'); prev.textContent = '‹ Prev'; prev.disabled = meta.page <= 1; prev.addEventListener('click', () => onPage(meta.page - 1));
            const next = document.createElement('button'); next.textContent = 'Next ›'; next.disabled = meta.page >= meta.total_pages; next.addEventListener('click', () => onPage(meta.page + 1));
            const info = document.createElement('div'); info.style.marginLeft = '8px'; info.textContent = `Trang ${meta.page} / ${meta.total_pages} — ${meta.total} bản ghi`;

            // Go-to-page input + button
            const gotoInput = document.createElement('input');
            gotoInput.type = 'number';
            gotoInput.min = 1;
            gotoInput.max = meta.total_pages;
            gotoInput.value = meta.page;
            gotoInput.style.width = '80px';
            gotoInput.style.marginLeft = '8px';
            gotoInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { const p = Number(gotoInput.value) || meta.page; const np = Math.max(1, Math.min(meta.total_pages, p)); onPage(np); } });

            const gotoBtn = document.createElement('button');
            gotoBtn.textContent = 'Go';
            gotoBtn.style.marginLeft = '6px';
            gotoBtn.addEventListener('click', () => { const p = Number(gotoInput.value) || meta.page; const np = Math.max(1, Math.min(meta.total_pages, p)); onPage(np); });

            container.appendChild(prev);
            container.appendChild(next);
            container.appendChild(info);
            container.appendChild(gotoInput);
            container.appendChild(gotoBtn);
        }

        let chart = null;
        function renderChart(labels, values) {
            const ctx = document.getElementById('revenueChart').getContext('2d'); if (chart) chart.destroy(); chart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Doanh thu', data: values, backgroundColor: '#007bff' }] }, options: { scales: { y: { beginAtZero: true } } } });
        }

        document.getElementById('search').addEventListener('input', (e) => { const q = e.target.value.toLowerCase().trim(); if (!rawData) return; if (q === '') return loadReport(); const merged = (rawData.merged || []).filter(r => JSON.stringify(r).toLowerCase().includes(q)); const mtbody = document.querySelector('#merged-table tbody'); mtbody.innerHTML = ''; if (merged.length > 0) { const cols = Object.keys(merged[0]); merged.forEach(r => { const tr = document.createElement('tr'); tr.innerHTML = cols.map(c => `<td>${r[c] ?? ''}</td>`).join(''); mtbody.appendChild(tr); }); } });

        document.getElementById('export-csv').addEventListener('click', () => {
            if (!rawData) return alert('Không có dữ liệu'); const rows = rawData.merged || []; if (rows.length === 0) return alert('Không có bản ghi ghép để xuất'); const cols = Object.keys(rows[0]); const csv = [cols.join(',')].concat(rows.map(r => cols.map(c => `"${String(r[c] || '').replace(/"/g, '""')}"`).join(','))).join('\n'); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'merged.csv'; a.click(); URL.revokeObjectURL(url);
        });

        // Initial load
        loadReport();
    </script>
</body>

</html>
